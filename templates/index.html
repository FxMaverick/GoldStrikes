<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoldStrikes</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 14px;
            text-align: center;
            width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
            margin-top: 8px;
            line-height: 1.4;
        }

        input[type="file"] {
            margin-bottom: 20px;
            width: 100%;
            color: #e2e8f0;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 12px 20px;
            width: 100%;
            color: #0f172a;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #0ea5e9;
        }

        #status {
            margin-top: 15px;
            font-size: 13px;
            color: #94a3b8;
        }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #64748b;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>GoldStrikes</h1>

    <div class="subtitle">
        Process gold options data to extract<br>
        key exposure levels for MetaTrader 5
        <br><br>
        <span style="font-size:12px; color:#64748b;">
            Used by MT5 algorithm to detect key liquidity levels
        </span>
    </div>

    <div style="font-size:12px; color:#94a3b8; margin-bottom:18px;">
        Download CSV from Barchart (select most active contract)
        <br>
        <a href="https://www.barchart.com/futures/quotes/GC*0/futures-prices" target="_blank" style="color:#38bdf8;">
            → View Gold Futures Contracts
        </a>
    </div>

    <form id="uploadForm">
        <input type="file" id="fileInput" name="file" accept=".csv" required>
        <button type="submit">Process Data</button>
    </form>

    <p id="status"></p>

    <div class="footer">
        Barchart CSV → Structured MT5 dataset
    </div>

</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const fileInput = document.getElementById("fileInput");
    const status = document.getElementById("status");

    if (!fileInput.files.length) {
        status.textContent = "Please select a file.";
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    status.textContent = "Processing...";

    try {
        const response = await fetch("/process", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            status.textContent = "Error processing file.";
            return;
        }

        const blob = await response.blob();

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "GoldStrikes.csv";
        document.body.appendChild(a);
        a.click();
        a.remove();

        status.textContent = "Download ready.";

    } catch (err) {
        status.textContent = "Connection error.";
    }
});
</script>

</body>
</html>
